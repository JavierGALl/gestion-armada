<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Gestión Naval</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary mb-4 shadow">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Dirección del Personal - Armada de Chile</span>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-12 mb-4">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-primary">Registrar Nuevo Funcionario</h5>
                        <form id="registro-form" class="row g-3">
                            <div class="col-md-4">
                                <input type="text" id="nombre" class="form-control" placeholder="Nombre Completo" required>
                            </div>
                            <div class="col-md-3">
                                <input type="text" id="rut" class="form-control" placeholder="RUT (12.345.678-9)" required>
                            </div>
                            <div class="col-md-3">
                                <select id="grado" class="form-control">
                                    <option value="Civil">Civil</option>
                                    <option value="Cabo">Cabo</option>
                                    <option value="Sargento">Sargento</option>
                                    <option value="Teniente">Teniente</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label text-muted small">Seleccionar Tecnologías:</label>
                                <div id="tech-checkboxes" class="d-flex flex-wrap gap-3 p-2 border rounded bg-white">
                                </div>
                            </div>
                            <input type="hidden" id="editing-id" value="">
                            <div class="col-md-2">
                                <button type="submit" class="btn btn-success w-100">Guardar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title text-primary">Listado de Funcionarios</h5>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th>Nombre</th>
                                        <th>Grado</th>
                                        <th>Tecnologías</th>
                                        <th>Acciones</th>
                                    </tr>
                                </thead>
                                <tbody id="lista-funcionarios">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
